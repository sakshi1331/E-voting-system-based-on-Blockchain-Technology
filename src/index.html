<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>E-Voting System with Auth</title>
  <link href="css/bootstrap.min.css" rel="stylesheet">
  <style>
    .auth-container { max-width: 500px; margin: 50px auto; }
    .form-section { margin-bottom: 20px; }
    .form-section input, .form-section select { margin: 10px 0; }
    .tab-content { display: none; }
    .tab-content.active { display: block; }
    .status-badge { padding: 5px 10px; border-radius: 3px; font-weight: bold; }
    .status-ok { background: #d4edda; color: #155724; }
    .status-warn { background: #fff3cd; color: #856404; }
  </style>
</head>
<body>
  <div class="container">
    <!-- Login Section -->
    <div id="loginSection" style="display: none;">
      <div class="auth-container">
        <h2>E-Voting System</h2>
        
        <!-- Login Tab -->
        <div id="loginTab" class="tab-content active">
          <h4>Login</h4>
          <form onsubmit="App.login(); return false;">
            <input type="email" id="loginEmail" placeholder="College Email" class="form-control" required>
            <input type="password" id="loginPassword" placeholder="Password" class="form-control" required>
            <button type="submit" class="btn btn-primary">Login</button>
          </form>
          <p style="margin-top: 15px;">
            <a href="#" onclick="$('.tab-content').removeClass('active'); $('#registerTab').addClass('active'); return false;">
              Don't have an account? Register here
            </a>
          </p>
        </div>

        <!-- Register Tab -->
        <div id="registerTab" class="tab-content">
          <h4>Register</h4>
          <form onsubmit="App.register(); return false;">
            <input type="text" id="registerStudentId" placeholder="Student ID" class="form-control" required>
            <input type="text" id="registerFirstName" placeholder="First Name" class="form-control" required>
            <input type="text" id="registerLastName" placeholder="Last Name" class="form-control" required>
            <input type="email" id="registerEmail" placeholder="College Email (@college.edu)" class="form-control" required>
            <select id="registerDepartment" class="form-control" required>
              <option value="">Select Department</option>
              <option value="CSE">Computer Science</option>
              <option value="ECE">Electronics</option>
              <option value="ME">Mechanical</option>
              <option value="CE">Civil</option>
            </select>
            <select id="registerSemester" class="form-control" required>
              <option value="">Select Semester</option>
              <option value="1">1st Semester</option>
              <option value="2">2nd Semester</option>
              <option value="3">3rd Semester</option>
              <option value="4">4th Semester</option>
              <option value="5">5th Semester</option>
              <option value="6">6th Semester</option>
              <option value="7">7th Semester</option>
              <option value="8">8th Semester</option>
            </select>
            <input type="password" id="registerPassword" placeholder="Password (min 8 chars, uppercase, number)" class="form-control" required>
            <button type="submit" class="btn btn-success">Register</button>
          </form>
          <p style="margin-top: 15px;">
            <a href="#" onclick="$('.tab-content').removeClass('active'); $('#loginTab').addClass('active'); return false;">
              Already have an account? Login here
            </a>
          </p>
        </div>
      </div>
    </div>

    <!-- Main Section -->
    <div id="mainSection" style="display: none;">
      <div class="row">
        <div class="col-md-12">
          <h1>E-Voting System</h1>
          <button class="btn btn-danger float-end" onclick="App.logout();">Logout</button>
          <hr>

          <!-- Status Dashboard -->
          <div class="row mb-4">
            <div class="col-md-4">
              <strong>Student:</strong> <span id="studentName"></span><br>
              <strong>Email:</strong> <span id="studentEmail"></span>
            </div>
            <div class="col-md-4">
              <strong>Wallet:</strong> <span id="walletAddress" style="font-family: monospace;"></span><br>
              <strong>Status:</strong> <span id="walletStatus" class="status-badge status-warn"></span>
            </div>
            <div class="col-md-4">
              <strong>Election:</strong> <span id="electionStatus" class="status-badge status-warn"></span><br>
              <button id="verifyWalletBtn" class="btn btn-sm btn-info" onclick="App.requestWalletVerification();">
                Verify Wallet
              </button>
            </div>
          </div>

          <!-- Candidates Table -->
          <h3>Candidates</h3>
          <table class="table">
            <thead>
              <tr>
                <th>#ID</th>
                <th>Name</th>
                <th>Votes</th>
              </tr>
            </thead>
            <tbody id="candidatesResults"></tbody>
          </table>

          <!-- Voting Form -->
          <h3>Cast Your Vote</h3>
          <div id="voteStatus" style="display: none;" class="alert alert-info"></div>
          <form id="voteForm" onsubmit="App.castVote(); return false;" style="display: none;">
            <div class="form-group">
              <label>Select Candidate:</label>
              <select id="candidatesSelect" class="form-control" required></select>
            </div>
            <button type="submit" class="btn btn-primary">Vote</button>
            <p class="text-muted">Note: Your vote cannot be changed once submitted.</p>
          </form>
        </div>
      </div>
    </div>
  </div>

  <!-- Scripts -->
  <script src="https://ajax.googleapis.com/ajax/libs/jquery/1.12.4/jquery.min.js"></script>
  <script src="js/bootstrap.min.js"></script>
  <script src="js/web3.min.js"></script>
  <script src="js/truffle-contract.js"></script>
  <script src="js/app-with-auth.js"></script>
</body>
</html>
